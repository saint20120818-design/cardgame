<h2 class="sr-only">1A2B 顏色卡牌猜謎遊戲,共六關</h2>
<style>
  :root, html, body { background: #000 !important; }
  .game-outer { background: #000; width: 100vw; min-height: 100vh; margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); margin-top: -1rem; margin-bottom: -1rem; padding: 4vh 0; display: flex; align-items: flex-start; justify-content: center; }
  .game-wrap { width: 80%; max-width: 720px; min-height: 92vh; font-family: var(--font-sans); --slot-w: 130px; --slot-h: 210px; --slot-gap: 20px; background: #000; display: flex; flex-direction: column; }
  .game-wrap * { box-sizing: border-box; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; font-size: 26px; color: #c0c0c0; padding: 8px 4px 0; }
  .stage-info { font-weight: 500; color: #fff; font-size: 30px; }
  .hint { font-size: 26px; color: #c0c0c0; text-align: center; margin: 10px 0 20px; min-height: 24px; padding: 0 12px; }
  .answer-row, .working-row, .palette { display: flex; justify-content: center; gap: var(--slot-gap); flex-wrap: wrap; }
  .answer-row { margin-bottom: 8px; }
  .slot { width: var(--slot-w); height: var(--slot-h); border-radius: 10px; border: 1px solid #3a3a3a; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #888; position: relative; transition: transform 0.25s ease, background 0.25s; }
  .slot.filled { background: var(--slot-color, #ccc); border-color: transparent; color: transparent; }
  .slot.revealed { animation: flip 0.5s ease; }
  @keyframes flip { 0% { transform: rotateY(0); } 50% { transform: rotateY(90deg); } 100% { transform: rotateY(0); } }

  /* 問號牌下方的正確答案文字 */
  .answer-names { display: flex; justify-content: center; gap: var(--slot-gap); flex-wrap: wrap; margin-bottom: 14px; min-height: 40px; }
  .name-cell { width: var(--slot-w); text-align: center; font-size: 16px; font-weight: 600; color: #fff; transition: opacity 0.4s ease; letter-spacing: 0.1em; text-shadow: 0 0 10px rgba(255,255,255,0.22); }
  .name-cell.show { animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(-8px); } 100% { opacity: 1; transform: translateY(0); } }

  .feedback { font-size: 17px; color: #c0c0c0; margin-left: 10px; min-width: 80px; display: flex; align-items: center; }
  .feedback .a { color: #6dd3a8; font-weight: 500; }
  .feedback .b { color: #f0c674; font-weight: 500; }
  .history { max-height: 32vh; overflow-y: auto; margin-bottom: 20px; padding: 0 8px; }
  .history-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; opacity: 0.9; flex-wrap: wrap; }
  .history-row .mini { width: calc(var(--slot-w) * 0.55); height: calc(var(--slot-h) * 0.5); border-radius: 6px; background: var(--mini-color, #ccc); border: 1px solid #3a3a3a; }
  .working-row { margin-bottom: 20px; min-height: var(--slot-h); padding: 0 8px; }
  .working-slot { width: var(--slot-w); height: var(--slot-h); border-radius: 10px; border: 2px dashed #555; background: #141414; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
  .working-slot.has-card { border-style: solid; border-color: transparent; background: var(--slot-color); }
  .working-slot.has-card::after { content: '×'; position: absolute; top: 6px; right: 12px; color: rgba(255,255,255,0.95); font-size: 24px; font-weight: 500; }
  .palette-label { text-align: center; font-size: 25px; color: #888; margin: 26px 0 14px; letter-spacing: 0.05em; }
  .palette { padding: 0 8px 8px; }
  .card { width: var(--slot-w); height: var(--slot-h); border-radius: 10px; background: var(--card-color); cursor: pointer; transition: transform 0.18s ease, opacity 0.18s; border: 1px solid rgba(255,255,255,0.1); }
  .card:hover { transform: translateY(-5px); }
  .card.used { opacity: 0.25; cursor: not-allowed; transform: none; }
  .actions { display: flex; justify-content: center; gap: 16px; margin-top: 24px; padding: 0 16px 24px; }
  .btn { padding: 16px 32px; border-radius: 10px; border: 1px solid #555; background: #2a2a2a; color: #f0f0f0; font-size: 28px; cursor: pointer; font-family: var(--font-sans); transition: background 0.15s; min-width: 120px; }
  .btn:hover { background: #3a3a3a; }
  .btn-primary { background: #f0f0f0; color: #000; border-color: #f0f0f0; }
  .btn-primary:hover { background: #fff; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 18px; z-index: 100; padding: 1.5rem; }
  .modal.show { display: flex; }
  .modal h3 { margin: 0; font-size: 38px; font-weight: 500; text-align: center; color: #fff; }
  .modal p { margin: 0; font-size: 28px; color: #c0c0c0; text-align: center; }
  .countdown { font-size: 25px; color: #888; margin-top: 4px; }
  .attempts { font-size: 25px; color: #888; }

  @media (max-width: 600px) {
    .game-wrap { width: 92%; --slot-w: 130px; --slot-h: 210px; --slot-gap: 20px; }
    .slot { font-size: 42px; }
    .name-cell { font-size: 28px; }
  }
  @media (max-width: 440px) {
    .game-wrap { --slot-w: 72px; --slot-h: 120px; --slot-gap: 10px; }
    .slot { font-size: 36px; }
    .name-cell { font-size: 22px; }
    .btn { padding: 14px 24px; font-size: 17px; min-width: 110px; }
  }
  @media (max-width: 360px) {
    .game-wrap { --slot-w: 60px; --slot-h: 100px; --slot-gap: 8px; }
    .slot { font-size: 32px; }
    .name-cell { font-size: 18px; }
  }
</style>

<div class="game-outer">
  <div class="game-wrap">
    <div class="top-bar">
      <div class="stage-info" id="stage-info">第 1 關 · 3 色</div>
      <div class="attempts" id="attempts">嘗試次數: 0</div>
    </div>

    <div class="answer-row" id="answer-row"></div>
    <div class="answer-names" id="answer-names"></div>
    <div class="hint" id="hint">猜出正確順序就能解鎖顏色</div>

    <div class="history" id="history"></div>

    <div class="working-row" id="working-row"></div>

    <div class="palette-label">可選顏色</div>
    <div class="palette" id="palette"></div>

    <div class="actions">
      <button class="btn" id="clear-btn">清除</button>
      <button class="btn btn-primary" id="submit-btn" disabled>送出</button>
    </div>
  </div>

  <div class="modal" id="modal">
    <h3 id="modal-title">過關!</h3>
    <p id="modal-text"></p>
    <div class="countdown" id="countdown"></div>
    <button class="btn btn-primary" id="next-btn">下一關</button>
  </div>
</div>

<script>
(function(){
  try {
    document.documentElement.style.background = '#000';
    document.body.style.background = '#000';
    document.body.style.margin = '0';
  } catch(e) {}

  const COLORS = [
    { name: 'red',    hex: '#E24B4A', zh: '紅' },
    { name: 'blue',   hex: '#378ADD', zh: '藍' },
    { name: 'yellow', hex: '#EF9F27', zh: '黃' },
    { name: 'green',  hex: '#97C459', zh: '綠' },
    { name: 'purple', hex: '#7F77DD', zh: '紫' }
  ];

  const STAGES = [
    { stage: 1, size: 3 },
    { stage: 2, size: 3 },
    { stage: 3, size: 4 },
    { stage: 4, size: 4 },
    { stage: 5, size: 5 },
    { stage: 6, size: 5 }
  ];

  const REVEAL_DELAY_MS = 3000;

  let stageIdx = 0;
  let answer = [];
  let working = [];
  let history = [];
  let attempts = 0;
  let solved = false;
  let autoAdvanceTimer = null;
  let countdownTimer = null;

  const $stageInfo = document.getElementById('stage-info');
  const $attempts = document.getElementById('attempts');
  const $answerRow = document.getElementById('answer-row');
  const $answerNames = document.getElementById('answer-names');
  const $hint = document.getElementById('hint');
  const $history = document.getElementById('history');
  const $workingRow = document.getElementById('working-row');
  const $palette = document.getElementById('palette');
  const $submit = document.getElementById('submit-btn');
  const $clear = document.getElementById('clear-btn');
  const $modal = document.getElementById('modal');
  const $modalTitle = document.getElementById('modal-title');
  const $modalText = document.getElementById('modal-text');
  const $countdown = document.getElementById('countdown');
  const $next = document.getElementById('next-btn');

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startStage() {
    const s = STAGES[stageIdx];
    const pool = COLORS.slice(0, s.size);
    answer = shuffle(pool).map(c => c.name);
    working = new Array(s.size).fill(null);
    history = [];
    attempts = 0;
    solved = false;
    $stageInfo.textContent = `第 ${s.stage} 關 · ${s.size} 色`;
    $modal.classList.remove('show');
    clearTimers();
    render();
  }

  function clearTimers() {
    if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  }

  function colorOf(name) {
    const c = COLORS.find(c => c.name === name);
    return c ? c.hex : '#ccc';
  }

  function zhOf(name) {
    const c = COLORS.find(c => c.name === name);
    return c ? c.zh : '';
  }

  function evaluate(guess) {
    let A = 0, B = 0;
    for (let i = 0; i < answer.length; i++) {
      if (guess[i] === answer[i]) A++;
      else if (answer.includes(guess[i])) B++;
    }
    return { A, B };
  }

  function render() {
    const size = answer.length;

    $answerRow.innerHTML = '';
    for (let i = 0; i < size; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      if (solved) {
        slot.classList.add('filled', 'revealed');
        slot.style.setProperty('--slot-color', colorOf(answer[i]));
      } else {
        slot.textContent = '?';
      }
      $answerRow.appendChild(slot);
    }

    // 問號牌下方直接顯示正確答案文字
    $answerNames.innerHTML = '';
    for (let i = 0; i < size; i++) {
      const cell = document.createElement('div');
      cell.className = 'name-cell';
      cell.textContent = zhOf(answer[i]);
      if (solved) {
        cell.classList.add('show');
      }
      $answerNames.appendChild(cell);
    }

    $attempts.textContent = `嘗試次數: ${attempts}`;

    $history.innerHTML = '';
    history.forEach(h => {
      const row = document.createElement('div');
      row.className = 'history-row';
      h.guess.forEach(name => {
        const mini = document.createElement('div');
        mini.className = 'mini';
        mini.style.setProperty('--mini-color', colorOf(name));
        row.appendChild(mini);
      });
      const fb = document.createElement('div');
      fb.className = 'feedback';
      fb.innerHTML = `<span class="a">${h.A}A</span>&nbsp;<span class="b">${h.B}B</span>`;
      row.appendChild(fb);
      $history.appendChild(row);
    });
    $history.scrollTop = $history.scrollHeight;

    $workingRow.innerHTML = '';
    for (let i = 0; i < size; i++) {
      const slot = document.createElement('div');
      slot.className = 'working-slot';
      if (working[i]) {
        slot.classList.add('has-card');
        slot.style.setProperty('--slot-color', colorOf(working[i]));
        slot.addEventListener('click', () => {
          if (solved) return;
          working[i] = null;
          render();
        });
      }
      $workingRow.appendChild(slot);
    }

    $palette.innerHTML = '';
    const available = COLORS.slice(0, size);
    available.forEach(c => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--card-color', c.hex);
      if (working.includes(c.name) || solved) {
        card.classList.add('used');
      } else {
        card.addEventListener('click', () => {
          const empty = working.indexOf(null);
          if (empty === -1) return;
          working[empty] = c.name;
          render();
        });
      }
      $palette.appendChild(card);
    });

    if (solved) {
      $hint.textContent = '答對了!顏色已揭曉';
    } else if (history.length === 0) {
      $hint.textContent = '點下方卡牌放入空格,湊滿後送出';
    } else {
      const last = history[history.length - 1];
      $hint.textContent = `上次: ${last.A}A ${last.B}B  (A=位置正確, B=有但位置錯)`;
    }

    const full = working.every(v => v !== null);
    $submit.disabled = !full || solved;
  }

  function showResultThenAdvance() {
    const isLast = stageIdx === STAGES.length - 1;
    $modalTitle.textContent = isLast ? '比賽結束!恭喜通關' : `第 ${STAGES[stageIdx].stage} 關過關!`;
    $modalText.textContent = isLast
      ? `共完成 6 關,最後一關用 ${attempts} 次猜出。`
      : `用了 ${attempts} 次猜中`;
    $next.textContent = isLast ? '重新開始' : '下一關';
    $modal.classList.add('show');

    let remaining = Math.ceil(REVEAL_DELAY_MS / 1000);
    $countdown.textContent = `${remaining} 秒後自動進入下一關...`;
    countdownTimer = setInterval(() => {
      remaining--;
      if (remaining > 0) {
        $countdown.textContent = `${remaining} 秒後自動進入下一關...`;
      } else {
        $countdown.textContent = '';
      }
    }, 1000);

    autoAdvanceTimer = setTimeout(() => {
      clearTimers();
      advance();
    }, REVEAL_DELAY_MS);
  }

  function advance() {
    if (stageIdx === STAGES.length - 1) {
      stageIdx = 0;
    } else {
      stageIdx++;
    }
    startStage();
  }

  $submit.addEventListener('click', () => {
    if (solved) return;
    const guess = working.slice();
    const { A, B } = evaluate(guess);
    attempts++;
    if (A === answer.length) {
      solved = true;
      working = new Array(answer.length).fill(null);
      render();
      setTimeout(showResultThenAdvance, REVEAL_DELAY_MS);
    } else {
      history.push({ guess, A, B });
      working = new Array(answer.length).fill(null);
      render();
    }
  });

  $clear.addEventListener('click', () => {
    if (solved) return;
    working = new Array(answer.length).fill(null);
    render();
  });

  $next.addEventListener('click', () => {
    clearTimers();
    advance();
  });

  startStage();
})();
</script>
